<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sentence Submission - Convention 2026</title>
    <!-- Libre Baskerville Font -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Libre+Baskerville:ital,wght@0,400;0,700;1,400&display=swap" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        :root {
            --brand-primary: #4F4DB1;
            --brand-bg: #C9CEFF;
            --brand-white: #FFFFFF;
            --border-radius: 12px;
        }

        body {
            font-family: 'Libre Baskerville', serif;
            background-color: var(--brand-bg);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
            color: var(--brand-primary);
        }

        /* Typography */
        h1, h2, h3, h4, h5, h6, strong, .bold-text {
            font-weight: 700; /* Bold */
        }
        
        p, label, span, .form-control, .form-select, .btn, .semi-bold-text {
            font-weight: 600; /* Semi-bold (using 600 as a standard semi-bold weight) */
        }

        .page-header {
            color: var(--brand-primary);
            margin-bottom: 2rem;
        }

        .submission-card {
            background-color: var(--brand-primary);
            color: var(--brand-white);
            border: none;
            border-radius: var(--border-radius);
            box-shadow: 0 10px 30px rgba(79, 77, 177, 0.2);
            max-width: 650px;
            width: 100%;
            overflow: hidden;
        }

        .card-body {
            padding: 3rem !important;
        }

        .form-label {
            color: var(--brand-white);
            margin-bottom: 0.5rem;
            display: block;
        }

        .form-control, .form-select {
            background-color: var(--brand-bg);
            border: none;
            color: var(--brand-primary);
            border-radius: var(--border-radius);
            padding: 12px 15px;
        }

        .form-control:focus, .form-select:focus {
            background-color: var(--brand-bg);
            border: 2px solid var(--brand-white);
            color: var(--brand-primary);
            box-shadow: none;
        }

        .form-control::placeholder {
            color: rgba(79, 77, 177, 0.5);
        }

        .btn-submit {
            background-color: var(--brand-bg);
            color: var(--brand-primary);
            border: none;
            border-radius: var(--border-radius);
            padding: 15px;
            transition: transform 0.2s, background-color 0.2s;
            font-size: 1.1rem;
        }

        .btn-submit:hover {
            background-color: var(--brand-white);
            color: var(--brand-primary);
            transform: translateY(-2px);
        }

        .category-desc {
            font-style: italic;
            font-size: 0.85rem;
            color: rgba(255, 255, 255, 0.8);
            margin-top: 8px;
        }

        .giveaway-section {
            background-color: rgba(255, 255, 255, 0.1);
            padding: 20px;
            border-radius: var(--border-radius);
            margin-top: 25px;
        }

        #email-group {
            display: none;
            margin-top: 15px;
        }
        
        .alert {
            border-radius: var(--border-radius);
            border: none;
        }

        .form-check-input {
            background-color: var(--brand-bg);
            border: none;
        }

        .form-check-input:checked {
            background-color: var(--brand-white);
            border-color: var(--brand-white);
        }
    </style>
</head>
<body>
    <div class="container d-flex flex-column align-items-center">
        <div class="page-header text-center">
            <h1 class="display-5 mb-1">Sentence Collection</h1>
            <p class="h5 semi-bold-text">Proof of Concept: Natural Language Integration</p>
        </div>

        <div class="card submission-card shadow-lg">
            <div class="card-body">
                <form id="submission-form">
                    <div class="mb-4">
                        <label for="category-select" class="form-label">Select Domain Category</label>
                        <select class="form-select" id="category-select" required>
                            <option value="" selected disabled>Choose a category...</option>
                        </select>
                        <div id="selected-category-desc" class="category-desc"></div>
                    </div>

                    <div class="mb-4">
                        <label for="sentence-text" class="form-label">Input Your Sentence</label>
                        <textarea class="form-control" id="sentence-text" rows="3" required placeholder="How do I list all files in a directory?"></textarea>
                    </div>

                    <div class="giveaway-section">
                        <div class="form-check">
                            <input class="form-check-input" type="checkbox" id="giveaway-opt-in">
                            <label class="form-check-label text-white ms-2" for="giveaway-opt-in">
                                Opt into <strong>€15 Amazon Gift Card</strong> Giveaway!
                            </label>
                        </div>
                        
                        <div id="email-group">
                            <label for="email-input" class="form-label">Email Address</label>
                            <input type="email" class="form-control" id="email-input" placeholder="your@email.com">
                        </div>
                    </div>

                    <button type="submit" class="btn btn-submit w-100 mt-4" id="submit-btn">Transmit Sentence</button>
                </form>
                <div id="feedback" class="mt-4"></div>
            </div>
        </div>
    </div>

    <script>
        async function loadCategories() {
            try {
                const response = await fetch('/categories');
                const categories = await response.json();
                const select = document.getElementById('category-select');
                categories.forEach(cat => {
                    const opt = document.createElement('option');
                    opt.value = cat.id;
                    opt.textContent = cat.name;
                    opt.dataset.description = cat.description;
                    select.appendChild(opt);
                });
            } catch (err) {
                console.error('Error loading categories:', err);
            }
        }

        document.getElementById('category-select').addEventListener('change', function() {
            const selectedOpt = this.options[this.selectedIndex];
            document.getElementById('selected-category-desc').textContent = selectedOpt.dataset.description || '';
        });

        document.getElementById('giveaway-opt-in').addEventListener('change', function() {
            const emailGroup = document.getElementById('email-group');
            const emailInput = document.getElementById('email-input');
            if (this.checked) {
                emailGroup.style.display = 'block';
                emailInput.setAttribute('required', 'required');
            } else {
                emailGroup.style.display = 'none';
                emailInput.removeAttribute('required');
                emailInput.value = '';
            }
        });

        document.getElementById('submission-form').addEventListener('submit', async (e) => {
            e.preventDefault();
            const feedback = document.getElementById('feedback');
            const btn = document.getElementById('submit-btn');
            
            const payload = {
                text: document.getElementById('sentence-text').value,
                category_id: parseInt(document.getElementById('category-select').value)
            };

            const email = document.getElementById('email-input').value;
            if (email) payload.email = email;

            try {
                btn.disabled = true;
                btn.textContent = 'Transmitting...';
                
                const response = await fetch('/sentences', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify(payload)
                });
                const result = await response.json();
                
                if (response.ok) {
                    feedback.innerHTML = `<div class="alert alert-light text-primary py-3"><strong>SUCCESS:</strong> Sentence Recorded. Thank you!</div>`;
                    document.getElementById('submission-form').reset();
                    document.getElementById('email-group').style.display = 'none';
                    document.getElementById('selected-category-desc').textContent = '';
                } else {
                    feedback.innerHTML = `<div class="alert alert-light text-danger py-3"><strong>NOTICE:</strong> ${result.error}</div>`;
                }
            } catch (err) {
                feedback.innerHTML = `<div class="alert alert-light text-danger py-3"><strong>ERROR:</strong> Transmission failed.</div>`;
            } finally {
                btn.disabled = false;
                btn.textContent = 'Transmit Sentence';
            }
        });

        loadCategories();
    </script>
</body>
</html>
