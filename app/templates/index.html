<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sentence Collection</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        body { background-color: #f8f9fa; }
        .stats-card { border-left: 5px solid #0d6efd; }
        .category-desc { font-style: italic; color: #6c757d; font-size: 0.9rem; }
    </style>
</head>
<body>
    <div class="container py-5">
        <h1 class="mb-4 text-center">Sentence Collection</h1>

        <div class="row g-4">
            <!-- Stats Section -->
            <div class="col-md-4">
                <div class="card stats-card shadow-sm mb-4">
                    <div class="card-body">
                        <h5 class="card-title text-primary">Global Stats</h5>
                        <p class="h3 mb-2" id="total-sentences">0</p>
                        <small class="text-muted d-block mb-3">Total Sentences</small>
                        <a href="/download/all" class="btn btn-sm btn-outline-primary w-100">Download All (.csv)</a>
                    </div>
                </div>

                <div class="card shadow-sm">
                    <div class="card-header bg-white">
                        <h5 class="card-title mb-0">Stats by Category</h5>
                    </div>
                    <div class="card-body p-0">
                        <ul class="list-group list-group-flush" id="category-stats-list">
                            <!-- Populated by JS -->
                        </ul>
                    </div>
                </div>
            </div>

            <!-- Forms Section -->
            <div class="col-md-8">
                <!-- Add Sentence Form -->
                <div class="card shadow-sm mb-4">
                    <div class="card-header bg-primary text-white">
                        <h5 class="card-title mb-0">Add New Sentence</h5>
                    </div>
                    <div class="card-body">
                        <form id="sentence-form">
                            <div class="mb-3">
                                <label for="sentence-text" class="form-label">Sentence</label>
                                <textarea class="form-control" id="sentence-text" rows="2" required placeholder="Type your sentence here..."></textarea>
                            </div>
                            <div class="mb-3">
                                <label for="category-select" class="form-label">Category</label>
                                <select class="form-select" id="category-select" required>
                                    <option value="" selected disabled>Select a category...</option>
                                    <!-- Populated by JS -->
                                </select>
                                <div id="selected-category-desc" class="category-desc mt-1"></div>
                            </div>
                            <button type="submit" class="btn btn-primary w-100">Submit Sentence</button>
                        </form>
                        <div id="sentence-feedback" class="mt-3"></div>
                    </div>
                </div>

                <!-- Add Category Form -->
                <div class="card shadow-sm">
                    <div class="card-header bg-secondary text-white">
                        <h5 class="card-title mb-0">Create New Category</h5>
                    </div>
                    <div class="card-body">
                        <form id="category-form">
                            <div class="mb-3">
                                <label for="cat-name" class="form-label">Category Name</label>
                                <input type="text" class="form-control" id="cat-name" required placeholder="e.g., Famous Quotes">
                            </div>
                            <div class="mb-3">
                                <label for="cat-desc" class="form-label">Short Description</label>
                                <input type="text" class="form-control" id="cat-desc" placeholder="Briefly describe this category">
                            </div>
                            <button type="submit" class="btn btn-secondary w-100">Create Category</button>
                        </form>
                        <div id="category-feedback" class="mt-3"></div>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script>
        async function updateStats() {
            try {
                const response = await fetch('/stats');
                const data = await response.json();
                
                document.getElementById('total-sentences').textContent = data.total_sentences;
                
                const statsList = document.getElementById('category-stats-list');
                statsList.innerHTML = '';
                data.category_stats.forEach(stat => {
                    const li = document.createElement('li');
                    li.className = 'list-group-item d-flex justify-content-between align-items-center';
                    li.innerHTML = `
                        <div>
                            ${stat.category_name} 
                            <span class="badge bg-primary rounded-pill ms-1">${stat.count}</span>
                        </div>
                        <a href="/download/category/${stat.category_id}" class="btn btn-link btn-sm p-0 text-decoration-none">⬇️ Download</a>
                    `;
                    statsList.appendChild(li);
                });
            } catch (err) {
                console.error('Error fetching stats:', err);
            }
        }

        async function loadCategories() {
            try {
                const response = await fetch('/categories');
                const categories = await response.json();
                
                const select = document.getElementById('category-select');
                const currentVal = select.value;
                
                select.innerHTML = '<option value="" disabled>Select a category...</option>';
                categories.forEach(cat => {
                    const opt = document.createElement('option');
                    opt.value = cat.id;
                    opt.textContent = cat.name;
                    opt.dataset.description = cat.description;
                    select.appendChild(opt);
                });
                
                if (currentVal) select.value = currentVal;
            } catch (err) {
                console.error('Error loading categories:', err);
            }
        }

        document.getElementById('category-select').addEventListener('change', function() {
            const selectedOpt = this.options[this.selectedIndex];
            document.getElementById('selected-category-desc').textContent = selectedOpt.dataset.description || '';
        });

        document.getElementById('sentence-form').addEventListener('submit', async (e) => {
            e.preventDefault();
            const feedback = document.getElementById('sentence-feedback');
            const btn = e.target.querySelector('button');
            
            const payload = {
                text: document.getElementById('sentence-text').value,
                category_id: parseInt(document.getElementById('category-select').value),
                source: 'manual'
            };

            try {
                btn.disabled = true;
                const response = await fetch('/sentences', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify(payload)
                });
                const result = await response.json();
                
                if (response.ok) {
                    feedback.innerHTML = `<div class="alert alert-success">${result.message}</div>`;
                    document.getElementById('sentence-text').value = '';
                    updateStats();
                } else {
                    feedback.innerHTML = `<div class="alert alert-warning">${result.error}</div>`;
                }
            } catch (err) {
                feedback.innerHTML = `<div class="alert alert-danger">Error submitting sentence.</div>`;
            } finally {
                btn.disabled = false;
            }
        });

        document.getElementById('category-form').addEventListener('submit', async (e) => {
            e.preventDefault();
            const feedback = document.getElementById('category-feedback');
            const btn = e.target.querySelector('button');

            const payload = {
                name: document.getElementById('cat-name').value,
                description: document.getElementById('cat-desc').value
            };

            try {
                btn.disabled = true;
                const response = await fetch('/categories', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify(payload)
                });
                const result = await response.json();
                
                if (response.ok) {
                    feedback.innerHTML = `<div class="alert alert-success">${result.message}</div>`;
                    document.getElementById('cat-name').value = '';
                    document.getElementById('cat-desc').value = '';
                    loadCategories();
                    updateStats();
                } else {
                    feedback.innerHTML = `<div class="alert alert-warning">${result.error}</div>`;
                }
            } catch (err) {
                feedback.innerHTML = `<div class="alert alert-danger">Error creating category.</div>`;
            } finally {
                btn.disabled = false;
            }
        });

        // Initial Load
        loadCategories();
        updateStats();
        // Polling stats every 5 seconds
        setInterval(updateStats, 5000);
    </script>
</body>
</html>
